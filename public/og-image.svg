<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#05030a"/>
      <stop offset="0.45" stop-color="#07061a"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="25%" r="65%">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="82%" cy="22%" r="60%">
      <stop offset="0" stop-color="#2dfcff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2dfcff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="62%" cy="88%" r="65%">
      <stop offset="0" stop-color="#b6ff00" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#b6ff00" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="280" cy="160" r="340" fill="url(#g1)"/>
  <circle cx="970" cy="140" r="320" fill="url(#g2)"/>
  <circle cx="760" cy="560" r="360" fill="url(#g3)"/>

  <g opacity="0.25">
    <g stroke="#2dfcff" stroke-opacity="0.25" stroke-width="1">
      <path d="M0 80H1200M0 140H1200M0 200H1200M0 260H1200M0 320H1200M0 380H1200M0 440H1200M0 500H1200M0 560H1200"/>
    </g>
    <g stroke="#b6ff00" stroke-opacity="0.18" stroke-width="1">
      <path d="M80 0V630M160 0V630M240 0V630M320 0V630M400 0V630M480 0V630M560 0V630M640 0V630M720 0V630M800 0V630M880 0V630M960 0V630M1040 0V630M1120 0V630"/>
    </g>
  </g>

  <g filter="url(#blur)" opacity="0.55">
    <circle cx="650" cy="300" r="150" fill="#2dfcff" opacity="0.16"/>
    <circle cx="520" cy="340" r="170" fill="#7c3aed" opacity="0.12"/>
  </g>

  <g filter="url(#glow)">
    <text x="90" y="290" font-family="Space Grotesk, Inter, ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="700" fill="#ffffff" fill-opacity="0.92">
      Kabir Mahmud
    </text>
    <text x="90" y="355" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="600" fill="#2dfcff" fill-opacity="0.95">
      Full Stack Developer & Creative Technologist
    </text>
    <text x="90" y="420" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18" font-weight="600" fill="#b6ff00" fill-opacity="0.75">
      BUILD: ALIEN_WIRED // SIGNAL: CLEAN
    </text>
  </g>
</svg>

